name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
      project:
        description: 'Playwright project to run'
        required: false
        default: 'e2e-admin'
        type: choice
        options:
          - e2e-admin
          - e2e-user
          - visual
          - mobile

env:
  TEST_ENV: ${{ inputs.environment || 'staging' }}
  CI: true

jobs:
  test:
    name: '${{ matrix.project }} (${{ inputs.environment || ''staging'' }})'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: ${{ inputs.project && fromJSON(format('["{0}"]', inputs.project)) || fromJSON('["e2e-admin", "visual"]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create auth directory
        run: mkdir -p auth

      - name: Run tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          STANDARD_PASS: ${{ secrets.STANDARD_PASS }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.project }}
          path: |
            reports/
            test-results/
          retention-days: 14

      - name: Upload visual snapshots
        uses: actions/upload-artifact@v4
        if: matrix.project == 'visual' && failure()
        with:
          name: visual-diff-${{ matrix.project }}
          path: test-results/**/*.png
          retention-days: 7

  report:
    name: Publish Report
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: test-report-*
          merge-multiple: true

      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: all-reports/reports/playwright-html
